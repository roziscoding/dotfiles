# Migrated from ~/.screenrc

# --- General Options ---

# startup_message off  -> tmux shows no startup message; nothing to set.

# defscrollback 5000
set -g history-limit 5000

# altscreen on  (this is tmux's default; kept explicit for parity)
set -g alternate-screen on

# shell -$SHELL  (the leading "-" means a login shell)
set -g default-shell "$SHELL"
set -g default-command "${SHELL} -l"

# truecolor on
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Match screen's C-a prefix (screen's default; tmux defaults to C-b).
# C-a a sends a literal C-a, like screen's "C-a a".
unbind C-b
set -g prefix C-a
bind a send-prefix

# Index windows/panes from 1 and keep them renumbered on close,
# so the numbers in the status bar stay tidy.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Theme (Catppuccin Mocha palette) ---
# bg #1e1e2e  surface #313244  subtle #6c7086  text #cdd6f4
# blue #89b4fa  mauve #cba6f7  green #a6e3a1  peach #fab387  yellow #f9e2af  red #f38ba8

# --- Status Bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5            # refresh battery/load/clock every 5s
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 150

# Left: session name. Block turns yellow while the prefix key is held.
set -g status-left "#[fg=#1e1e2e,bg=#{?client_prefix,#f9e2af,#89b4fa},bold] #S #[fg=#{?client_prefix,#f9e2af,#89b4fa},bg=#1e1e2e,nobold] "

# Windows: dim by default, current highlighted in mauve. 🔍 marks a zoomed pane.
set -g window-status-format "#[fg=#6c7086] #I #[fg=#bac2de]#W#{?window_zoomed_flag, 🔍,} "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I #W#{?window_zoomed_flag, 🔍,} "
set -g window-status-separator ""
set -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e"
set -g window-status-bell-style "fg=#f38ba8,bg=#1e1e2e,bold"

# Right: load · battery (⚡ when charging) · date · time
# Segments are OS-agnostic (macOS pmset + Linux /sys/class/power_supply); the
# branch that doesn't apply on a given host produces no output. On a machine
# with no battery (desktop/VM) the battery slot is simply empty.
set -g status-right "#[fg=#6c7086]load #[fg=#a6e3a1]#(uptime | sed -E 's/.*average[s]?: //; s/[, ].*//') #[fg=#313244]│#[fg=#fab387] #(pmset -g batt 2>/dev/null | grep -Eo '[0-9]+%' | head -n1; cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -n1 | sed -e 's/.*/&%/')#(pmset -g batt 2>/dev/null | grep -q 'AC Power' && echo ' ⚡'; grep -q Charging /sys/class/power_supply/BAT*/status 2>/dev/null && echo ' ⚡') #[fg=#313244]│#[fg=#89b4fa] %a %d %b #[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "

# --- Accents that tie into the theme ---
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "fg=#1e1e2e,bg=#f9e2af,bold"
set -g mode-style "fg=#1e1e2e,bg=#f9e2af"
