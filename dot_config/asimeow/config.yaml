roots:
- path: ~/
ignore:
- .git
- OrbStack
- .cache
- .cargo
- .cursor
- .deno
- .docker
- .lmstudio
- .npm
- .orbstack
- .pnpm-store
- .rustup
- .venv
rules:
- name: net
  file_match: '*.csproj'
  exclusions:
  - obj
  - bin
  - packages
- name: rust
  file_match: cargo.toml
  exclusions:
  - target
- name: go
  file_match: go.mod
  exclusions:
  - vendor
- name: node
  file_match: package.json
  exclusions:
  - node_modules
  - dist
- name: python
  file_match: requirements.txt
  exclusions:
  - __pycache__
  - .venv
- name: java
  file_match: pom.xml
  exclusions:
  - target
- name: php
  file_match: composer.json
  exclusions:
  - vendor
- name: vagrant
  file_match: Vagrantfile
  exclusions:
  - .vagrant
- name: bower
  file_match: bower.json
  exclusions:
  - bower_components
- name: haskell
  file_match: stack.yaml
  exclusions:
  - .stack-work
- name: carthage
  file_match: Cartfile
  exclusions:
  - Carthage
- name: cocoapods
  file_match: Podfile
  exclusions:
  - Pods
- name: swift
  file_match: Package.swift
  exclusions:
  - .build
- name: elixir
  file_match: mix.exs
  exclusions:
  - _build
- name: project
  file_match: '*.prj'
  exclusions:
  - bin
  - debug
- name: bun
  file_match: bun.lockb
  exclusions:
  - node_modules
  - .bun
- name: bun-text
  file_match: bun.lock
  exclusions:
  - node_modules
  - .bun
- name: pnpm
  file_match: pnpm-lock.yaml
  exclusions:
  - node_modules
- name: vite-next
  file_match: vite.config.*
  exclusions:
  - .vite
  - .next
- name: tauri
  file_match: tauri.conf.json
  exclusions:
  - src-tauri/target